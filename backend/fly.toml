# fly.toml app configuration file generated for reflectai-api-icy-dust-4243 on 2026-02-23T16:41:50-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'reflectai-api-icy-dust-4243'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  # API does not load ML models; cache vars optional (e.g. for any future use)
  HF_DATASETS_CACHE = '/tmp/.cache/huggingface'
  HF_HOME = '/tmp/.cache/huggingface'
  TRANSFORMERS_CACHE = '/tmp/.cache/huggingface'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

  # Health check: allow enough time for app to start (DB init)
  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '90s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
