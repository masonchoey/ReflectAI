# fly.toml app configuration file generated for reflectai-worker on 2026-02-23T17:30:29-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'reflectai-worker'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile.worker'

[env]
  HF_DATASETS_CACHE = '/data/huggingface'
  HF_HOME = '/data/huggingface'
  TRANSFORMERS_CACHE = '/data/huggingface'
  auto_stop_machines = 'true'

# Persistent volume for ML model weights:
#   - ibm-granite/granite-embedding-30m-english (~120 MB)
#   - SamLowe/roberta-base-go_emotions (~500 MB)
#   - HuggingFaceTB/SmolLM2-135M-Instruct (~270 MB)
# Create once: fly volumes create reflectai_worker_models --size 3 --region lax -a reflectai-worker
[[mounts]]
  source = 'reflectai_worker_models'
  destination = '/data/huggingface'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
