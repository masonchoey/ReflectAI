name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# ── Shared URL constants ──────────────────────────────────────────────────────
# These are referenced by both jobs. Keeping them here makes it easy to update
# when the Fly.io app name or Vercel URL changes.
env:
  VERCEL_URL: https://reflect-ai-nine.vercel.app
  FLY_API_URL: https://reflectai-api-icy-dust-4243.fly.dev

jobs:
  # ── Mock-based E2E tests ─────────────────────────────────────────────────────
  # Runs on every push / PR. Tests run against the deployed Vercel frontend.
  # All backend API calls are intercepted by page.route() — no real API hits.
  #
  # Required env vars:
  #   BASE_URL      — Playwright baseURL; must be the deployed Vercel frontend URL
  #   VITE_API_URL  — must match the VITE_API_URL baked into the Vercel build
  #                   so that page.route() patterns intercept the right requests
  e2e:
    name: Playwright E2E (mocked)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies (cached hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Verify Vercel deployment is accessible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$VERCEL_URL")
          if [ "$STATUS" != "200" ]; then
            echo "Vercel deployment returned HTTP $STATUS — aborting tests"
            exit 1
          fi
          echo "Vercel deployment is up (HTTP $STATUS)"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          # Frontend under test — no local dev server is started (playwright.config.js skips
          # webServer when BASE_URL is not localhost)
          BASE_URL: ${{ env.VERCEL_URL }}
          # Must match VITE_API_URL baked into the Vercel build so page.route()
          # intercepts the correct URLs (auth, entries, therapy, tasks, etc.)
          VITE_API_URL: ${{ env.FLY_API_URL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  # ── Connectivity tests against real deployed services ────────────────────────
  # Runs only on push to main (after deploy). Hits Fly.io, Vercel, and OpenRouter
  # with real network calls — no mocking. Uses the public /auth/demo endpoint so
  # no secrets are required.
  #
  # Required env vars:
  #   PROD_API_URL      — Fly.io FastAPI base URL
  #   PROD_FRONTEND_URL — Vercel frontend URL (used for browser navigation tests
  #                       and the OpenRouter-503 UI sub-test)
  connectivity:
    name: Connectivity Tests (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run after a successful push to main so we test the deployed version
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache-conn
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache-conn.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies (cached hit)
        if: steps.playwright-cache-conn.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run connectivity tests
        run: npm run test:connectivity
        env:
          CI: "true"
          # Fly.io FastAPI — tested directly via HTTP request fixture
          PROD_API_URL: ${{ env.FLY_API_URL }}
          # Vercel frontend — used for browser navigation and the 503 UI sub-test
          PROD_FRONTEND_URL: ${{ env.VERCEL_URL }}

      - name: Upload connectivity test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-connectivity
          path: frontend/playwright-report-connectivity/
          retention-days: 14
