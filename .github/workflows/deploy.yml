name: Deploy to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy-api:
    name: Deploy FastAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy FastAPI app
        run: flyctl deploy --config fly.toml --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_API }}

  deploy-worker:
    name: Deploy Celery Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Celery worker
        run: flyctl deploy --config fly.worker.toml --remote-only
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER }}

      - name: Scale Celery worker to 1 machine
        run: flyctl scale count 1 --config fly.worker.toml --yes
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER }}
